services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tinobot}
      POSTGRES_USER: ${POSTGRES_USER:-tinobot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-this-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tinobot} -d ${POSTGRES_DB:-tinobot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: app
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tinobot}:${POSTGRES_PASSWORD:-change-this-password}@postgres:5432/${POSTGRES_DB:-tinobot}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npx", "prisma", "migrate", "deploy", "--config", "apps/web/prisma.config.ts"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tinobot}:${POSTGRES_PASSWORD:-change-this-password}@postgres:5432/${POSTGRES_DB:-tinobot}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${API_PORT:-3001}:3001"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-tinobot}:${POSTGRES_PASSWORD:-change-this-password}@postgres:5432/${POSTGRES_DB:-tinobot}?schema=public
      INTERNAL_API_URL: http://api:3001
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:
